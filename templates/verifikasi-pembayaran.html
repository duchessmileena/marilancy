<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifikasi Bukti Pembayaran - MariLancy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <nav class="bg-black text-white px-8 py-4 flex justify-between items-center shadow-lg">
    <a class="text-xl font-bold flex items-center gap-2" href="/freelancer">
      <i class="ri-briefcase-4-line"></i> MariLancy
    </a>
    <button onclick="history.back()" class="text-sm text-gray-300 hover:text-white flex items-center gap-1">
      <i class="ri-arrow-left-line"></i> Kembali
    </button>
  </nav>

  <div class="max-w-3xl mx-auto w-full px-4 py-10 flex-1 flex flex-col justify-center">
    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-6 md:p-8 text-center">
      <h2 class="text-2xl font-bold text-gray-900 mb-2">Verifikasi Pembayaran Klien</h2>
      <p class="text-sm text-gray-500 mb-6">Periksa gambar bukti transfer di bawah ini dengan teliti sebelum melakukan konfirmasi status pembayaran.</p>
      
      <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 flex justify-center items-center overflow-hidden mb-8 min-h-[300px] max-h-[500px]">
        <img id="buktiImage" src="" alt="Bukti Transfer" class="max-w-full max-h-[460px] object-contain rounded-lg shadow-sm hidden">
        <div id="loadingPlaceholder" class="text-gray-400 text-sm flex flex-col items-center gap-2">
          <i class="ri-loader-4-line text-3xl animate-spin text-teal-600"></i>
          <span>Memuat berkas gambar...</span>
        </div>
      </div>

      <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
        <button onclick="updateTransactionStatus('rejected')" class="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white font-bold px-8 py-3 rounded-xl transition shadow-lg shadow-red-600/20 flex items-center justify-center gap-2">
          <i class="ri-close-circle-line text-lg"></i> Bukti Tidak Sesuai
        </button>
        <button onclick="updateTransactionStatus('success')" class="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white font-bold px-8 py-3 rounded-xl transition shadow-lg shadow-green-600/20 flex items-center justify-center gap-2">
          <i class="ri-checkbox-circle-line text-lg"></i> Bukti Sesuai (Lunas)
        </button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");
    const urlParams = new URLSearchParams(window.location.search);
    const txId = urlParams.get('tx_id');
    const imgUrl = urlParams.get('img');

    if (!token) {
      alert("Silakan login terlebih dahulu");
      window.location.href = "/";
    }

    if (imgUrl && imgUrl !== "null" && imgUrl !== "undefined" && imgUrl.trim() !== "") {
      const imgElement = document.getElementById("buktiImage");
      const placeholder = document.getElementById("loadingPlaceholder");
      
      imgElement.src = decodeURIComponent(imgUrl);
      imgElement.onload = () => {
        imgElement.classList.remove("hidden");
        placeholder.classList.add("hidden");
      };
      imgElement.onerror = () => {
        placeholder.innerHTML = `<i class="ri-error-warning-line text-3xl text-red-500"></i><span class="text-red-500 font-medium">Gagal memuat gambar bukti transfer.</span>`;
      };
    } else {
      document.getElementById("loadingPlaceholder").innerHTML = `<i class="ri-file-unknow-line text-3xl text-gray-400"></i><span>Tautan gambar bukti tidak valid atau kosong.</span>`;
    }

    async function updateTransactionStatus(statusTarget) {
      if (!txId || txId === "0") {
        alert("ID Transaksi tidak valid!");
        return;
      }

      const confirmMessage = statusTarget === 'success' 
        ? "Apakah Anda yakin pembayaran ini sudah sesuai? Status proyek akan berubah menjadi Lunas."
        : "Apakah Anda yakin bukti pembayaran ini tidak sesuai? Status pembayaran akan ditolak.";

      if (!confirm(confirmMessage)) return;

      try {
        const res = await fetch(`/api/projects/transactions/${txId}/status`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json', 
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ status: statusTarget })
        });
        
        if (res.ok) {
          alert(`Verifikasi berhasil! Status transaksi diperbarui ke: ${statusTarget === 'success' ? 'Sudah Dibayar' : 'Ditolak'}`);
          window.location.href = "/freelancer/projects";
        } else {
          alert("Gagal memperbarui status verifikasi transaksi.");
        }
      } catch (err) {
        console.error(err);
        alert("Terjadi kesalahan jaringan.");
      }
    }
  </script>
</body>
</html>
