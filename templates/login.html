<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - MariLancy</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d') no-repeat center center/cover;
    }

    .glass {
      backdrop-filter: blur(18px);
      background: rgba(0,0,0,0.55);
    }
  </style>
</head>

<body class="h-screen flex text-white relative">

<div class="hidden md:flex w-1/2 items-center justify-center bg-black/80 backdrop-blur-sm px-16">
  <h1 class="text-5xl font-bold leading-tight">
    Cari Proyek <br>
    Freelance? <br>
    MariLancy aja!
  </h1>
</div>

<div class="w-full md:w-1/2 flex items-center justify-center bg-black/80 backdrop-blur-sm">

  <div class="w-[400px]">

    <h1 class="text-5xl font-semibold mb-8 text-center">Welcome Back</h1>

    <input id="email"
      class="w-full mb-4 p-4 rounded-xl bg-gray-200 text-black outline-none"
      placeholder="Email">

    <input id="password" type="password"
      class="w-full mb-2 p-4 rounded-xl bg-gray-200 text-black outline-none"
      placeholder="Password">

    <div class="text-right mb-6">
      <button onclick="openForgotModal()" class="text-sm text-teal-400 hover:text-teal-300 transition">Forgot Password?</button>
    </div>

    <button onclick="login()"
      class="w-full bg-teal-500 hover:bg-teal-600 p-4 rounded-xl font-semibold transition">
      Sign in
    </button>

    <p id="error_msg" class="text-red-400 text-sm mt-3 hidden text-center"></p>

    <div class="flex items-center my-6">
      <div class="flex-1 h-[1px] bg-gray-500"></div>
      <span class="px-3 text-sm text-gray-400">or</span>
      <div class="flex-1 h-[1px] bg-gray-500"></div>
    </div>

    <p class="text-center text-gray-400 mb-2">Sign in With Google</p>
    <div class="flex justify-center mb-6">
      <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-black font-bold cursor-pointer hover:bg-gray-200 transition">
        G
      </div>
    </div>

    <p class="text-center text-sm text-gray-400">
      Belum punya akun?
      <a href="/register" class="text-teal-400 hover:underline">Register</a>
    </p>

  </div>

</div>


<div id="forgotModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md z-50 flex items-center justify-center">
  <div class="bg-gray-900 border border-gray-700 p-8 rounded-2xl w-[400px] shadow-2xl relative">
    <h2 class="text-2xl font-bold mb-2">Lupa Password?</h2>
    <p class="text-sm text-gray-400 mb-6">Masukkan email yang terdaftar untuk menemukan akun kamu.</p>
    
    <input id="forgot_email_input"
      class="w-full mb-4 p-4 rounded-xl bg-gray-200 text-black outline-none"
      placeholder="Masukkan Email">
      
    <p id="forgot_error_msg" class="text-red-400 text-sm mb-3 hidden"></p>

    <button onclick="submitForgotPassword()"
      class="w-full bg-teal-500 hover:bg-teal-600 p-3 rounded-xl font-semibold transition mb-3">
      Cari Akun
    </button>
    <button onclick="closeForgotModal()"
      class="w-full bg-transparent border border-gray-500 hover:bg-gray-800 p-3 rounded-xl font-semibold transition text-gray-300">
      Batal
    </button>
  </div>
</div>

<div id="resetModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md z-50 flex items-center justify-center">
  <div class="bg-gray-900 border border-gray-700 p-8 rounded-2xl w-[400px] shadow-2xl relative">
    <h2 class="text-2xl font-bold mb-2">Ganti Password</h2>
    <p class="text-sm text-gray-400 mb-6">Silakan buat password baru untuk akun kamu.</p>
    
    <input id="new_password" type="password"
      class="w-full mb-4 p-4 rounded-xl bg-gray-200 text-black outline-none"
      placeholder="Password Baru">

    <input id="confirm_password" type="password"
      class="w-full mb-4 p-4 rounded-xl bg-gray-200 text-black outline-none"
      placeholder="Konfirmasi Password Baru">
      
    <p id="reset_error_msg" class="text-red-400 text-sm mb-3 hidden"></p>

    <button onclick="submitNewPassword()"
      class="w-full bg-teal-500 hover:bg-teal-600 p-3 rounded-xl font-semibold transition mb-3">
      Simpan Password
    </button>
    <button onclick="closeResetModal()"
      class="w-full bg-transparent border border-gray-500 hover:bg-gray-800 p-3 rounded-xl font-semibold transition text-gray-300">
      Batal
    </button>
  </div>
</div>


<script>
document.getElementById("email").addEventListener("input", clearError)
document.getElementById("password").addEventListener("input", clearError)

function clearError() {
  const errorBox = document.getElementById("error_msg")
  errorBox.classList.add("hidden")
  errorBox.innerText = ""
}

const token = localStorage.getItem("token")
const role = localStorage.getItem("role")

if (token && role) {
  if (role === "client") {
    window.location.href = "/client"
  } else if (role === "freelancer") {
    window.location.href = "/freelancer"
  } else if (role === "admin") {
    window.location.href = "/admin"
  }
}

async function login() {
  const email = document.getElementById("email").value.trim()
  const password = document.getElementById("password").value.trim()

  if (!email || !password) {
    showError("Email dan password wajib diisi", "error_msg")
    return
  }

  if (!email.toLowerCase().endsWith("@gmail.com")) {
    showError("User Tidak Ditemukan", "error_msg")
    return
  }

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    })

    const data = await res.json()

    console.log("🔥 RESPONSE:", data)

    if (!res.ok) {
      showError(data.error || "Login gagal", "error_msg")
      return
    }

    localStorage.setItem("token", data.token)
    localStorage.setItem("role", data.role)
    localStorage.setItem("client_id", data.user_id)

    switch (data.role) {
      case "client":
        window.location.href = "/client"
        break
      case "freelancer":
        window.location.href = "/freelancer"
        break
      case "admin":
        window.location.href = "/admin"
        break
      default:
        showError("Role tidak dikenali", "error_msg")
    }

  } catch (err) {
    console.error("❌ ERROR LOGIN:", err)
    showError("Terjadi kesalahan server", "error_msg")
  }
}

function showError(msg, elementId) {
  const errorBox = document.getElementById(elementId)
  errorBox.innerText = msg
  errorBox.classList.remove("hidden")
}

function hideError(elementId) {
  const errorBox = document.getElementById(elementId)
  errorBox.classList.add("hidden")
  errorBox.innerText = ""
}

let tempEmailForReset = ""; 

function openForgotModal() {
  document.getElementById("forgotModal").classList.remove("hidden")
  document.getElementById("forgot_email_input").value = document.getElementById("email").value; 
  hideError("forgot_error_msg")
}

function closeForgotModal() {
  document.getElementById("forgotModal").classList.add("hidden")
}

async function submitForgotPassword() {
  const email = document.getElementById("forgot_email_input").value.trim()

  if (!email) {
    showError("Email wajib diisi", "forgot_error_msg")
    return
  }

  try {
    const res = await fetch("/forgot-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    })
    const data = await res.json()
    
    if (!res.ok) {
      showError(data.error || "Email tidak ditemukan", "forgot_error_msg")
      return
    }

    tempEmailForReset = email;
    closeForgotModal();
    openResetModal(); 

  } catch (err) {
    console.error("❌ ERROR FORGOT PASSWORD:", err)
    showError("Terjadi kesalahan server", "forgot_error_msg")
  }
}

function openResetModal() {
  document.getElementById("resetModal").classList.remove("hidden")
  hideError("reset_error_msg")
}

function closeResetModal() {
  document.getElementById("resetModal").classList.add("hidden")
  document.getElementById("new_password").value = ""
  document.getElementById("confirm_password").value = ""
}

function checkPasswordRules(password) {
  if (password.length < 8) return "Password minimal 8 karakter";
  if (!/[A-Z]/.test(password)) return "Password harus mengandung minimal 1 huruf besar";
  if (!/[0-9]/.test(password)) return "Password harus mengandung minimal 1 angka";
  if (!/[^a-zA-Z0-9]/.test(password)) return "Password harus mengandung minimal 1 simbol (contoh: @, #, !)";
  return null;
}

async function submitNewPassword() {
  const newPassword = document.getElementById("new_password").value.trim()
  const confirmPassword = document.getElementById("confirm_password").value.trim()

  if (!newPassword || !confirmPassword) {
    showError("Semua kolom wajib diisi", "reset_error_msg")
    return
  }

  const passwordError = checkPasswordRules(newPassword);
  if (passwordError) {
    showError(passwordError, "reset_error_msg")
    return
  }

  if (newPassword !== confirmPassword) {
    showError("Konfirmasi password tidak cocok", "reset_error_msg")
    return
  }

  try {
    const res = await fetch("/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: tempEmailForReset, newPassword }) 
    })
    
    const data = await res.json()

    if (!res.ok) {
      showError(data.error || "Gagal mereset password", "reset_error_msg")
      return
    }

    alert("Password berhasil diubah! Silakan login dengan password baru.")
    closeResetModal()
    
    document.getElementById("email").value = tempEmailForReset
    document.getElementById("password").value = ""
    document.getElementById("password").focus()

  } catch (err) {
    console.error("❌ ERROR RESET PASSWORD:", err)
    showError("Terjadi kesalahan saat mengganti password", "reset_error_msg")
  }
}
</script>

</body>
</html>
